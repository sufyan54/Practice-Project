apiVersion: apps/v1
kind: Deployment
metadata:
  name: myapp
spec:
  replicas: 3
  selector:
    matchLabels:
      app: myapp
  template:
    metadata:
      labels:
        app: myapp
    spec:
      containers:
      - name: myapp
        image: sufyan12345/myapp:latest  # This will be replaced
        imagePullPolicy: Always  # CRITICAL!
        ports:
        - containerPort: 80